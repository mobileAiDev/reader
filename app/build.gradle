apply plugin: 'com.android.application'
apply plugin: 'org.greenrobot.greendao'

apply plugin: 'com.mob.sdk'
apply plugin: 'com.didi.dokit'

def do_kit = "3.7.11"

MobSDK {
    appKey "2dc105548a750"
    appSecret "b63ac145473ed640a5a449f368570596"
    SecVerify {}
    SMSSDK {
    }
    MobPush {
        devInfo {
//            XIAOMI {
